<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoloQuest — Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard">

    <!-- CARTE PERSONNAGE -->
    <div class="hero-card">
      <div class="hero-top">
        <div class="avatar">⚔️</div>
        <div class="hero-info">
          <h2 id="pseudo">Chasseur</h2>
          <span class="niveau-badge">Niveau <span id="niveau">1</span></span>
        </div>
        <button id="btn-deconnexion" class="btn-deco">Quitter</button>
      </div>
      <div class="xp-section">
        <div class="xp-bar">
          <div class="xp-fill" id="xp-fill"></div>
        </div>
        <p id="xp-texte">0 / 100 XP</p>
      </div>
    </div>

    <!-- QUETES DU JOUR -->
    <section class="quetes-section">
      <h3>⚡ Quêtes du jour</h3>
      <div id="liste-quetes"></div>
    </section>

  </div>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="game.js"></script>
</body>
</html>
