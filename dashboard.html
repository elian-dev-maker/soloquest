<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoloQuest — Dashboard</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <meta name="theme-color" content="#0a0a1a">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard">

    <!-- CARTE PERSONNAGE -->
    <div class="hero-card">
      <div class="hero-main">
        <div class="hero-info-col">
          <h2 id="pseudo">Chasseur</h2>
          <span class="niveau-badge">Niveau <span id="niveau">1</span></span>
          <div class="xp-section">
            <div class="xp-bar"><div class="xp-fill" id="xp-fill"></div></div>
            <p id="xp-texte">0 / 100 XP</p>
          </div>
          <button id="btn-deconnexion" class="btn-deco">Quitter</button>
        </div>
        <div class="hero-avatar-col">
          <canvas id="avatar-canvas" width="64" height="64"></canvas>
        </div>
      </div>
    </div>

    <!-- QUETES DU JOUR -->
    <section class="quetes-section">
      <h3>⚡ Quêtes du jour</h3>
      <div id="liste-quetes"></div>
    </section>
<a href="customisation.html" class="btn-custom">🎨 Personnaliser mon chasseur</a>
  </div>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="game.js"></script>
</body>
</html>
